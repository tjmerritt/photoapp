<!DOCTYPE html>
<html lang="en" x-data="adminApp" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Admin</title>
  <link rel="stylesheet" href="/tailwind.css">
  <link rel="stylesheet" href="/fonts.css">
  <script src="/admin.js"></script>
  <script defer src="/alpinejs.min.js"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-[#1a1a2e] text-white px-5 py-3.5 flex items-center justify-between">
    <h1 class="text-lg font-bold tracking-tight">Photo Admin</h1>
    <div class="flex items-center gap-5">
      <span class="text-xs text-white/60" x-text="offset + ' of ' + total + ' photos'"></span>
      <a href="/" class="text-xs text-white/60 hover:text-white transition">← Back to app</a>
    </div>
  </header>

  <!-- Auth error -->
  <div x-show="authError"
       class="max-w-md mx-auto mt-12 bg-red-50 border border-red-300 rounded-2xl p-6 text-center text-red-800 text-sm">
    You don't have admin access, or the server needs to be rebuilt with the latest code.
    If you just deployed, grant
    <code class="font-mono bg-red-100 px-1 rounded">authorized_non_public</code> to your user.
  </div>

  <!-- Loading skeleton -->
  <div x-show="loading && photos.length === 0"
       class="grid grid-cols-2 gap-4 max-w-4xl mx-auto p-4">
    <template x-for="n in [1,2,3,4,5,6]" :key="n">
      <div class="bg-white rounded-2xl overflow-hidden border border-gray-200 shadow-sm animate-pulse">
        <div class="w-full aspect-[4/3] bg-gray-200"></div>
        <div class="px-3 py-2.5 flex items-center justify-between gap-2">
          <div class="h-3 bg-gray-200 rounded w-2/3"></div>
          <div class="h-3 bg-gray-200 rounded w-12"></div>
        </div>
      </div>
    </template>
  </div>

  <!-- Photo grid -->
  <div x-show="photos.length > 0"
       class="grid grid-cols-2 gap-4 max-w-4xl mx-auto p-4">
    <template x-for="photo in photos" :key="photo.photoid">
      <div class="bg-white rounded-2xl overflow-hidden border shadow-sm transition-colors"
           :class="photo.is_public ? 'border-gray-200' : 'border-red-200 bg-red-50/30'">

        <!-- Thumbnail -->
        <a :href="'/?photoid=' + photo.photoid" target="_blank" class="block">
          <img :src="thumbUrl(photo.imageurl, 440)"
               :alt="photo.title || photo.photoid"
               loading="lazy"
               class="w-full aspect-[4/3] object-cover bg-gray-100 hover:opacity-90 transition-opacity" />
        </a>

        <!-- Footer -->
        <div class="px-3 py-2.5 flex items-center justify-between gap-2 border-t border-gray-100">
          <span class="text-xs text-gray-600 truncate flex-1 min-w-0"
                x-text="photo.title || '(no title)'"></span>

          <label class="flex items-center gap-1.5 cursor-pointer shrink-0 select-none">
            <input type="checkbox"
                   x-model="photo.is_public"
                   @change="savePublic(photo)"
                   class="w-4 h-4 accent-[#e94560] cursor-pointer" />
            <span class="text-xs font-semibold"
                  :class="photo.is_public ? 'text-green-600' : 'text-gray-400'"
                  x-text="photo.is_public ? 'Public' : 'Private'"></span>
          </label>
        </div>
      </div>
    </template>
  </div>

  <!-- Load more -->
  <div x-show="offset < total" class="flex justify-center py-6">
    <button @click="loadMore()"
            :disabled="loading"
            class="bg-[#1a1a2e] text-white text-sm font-semibold px-6 py-2.5 rounded-xl
                   hover:opacity-80 disabled:opacity-40 disabled:cursor-not-allowed transition-opacity">
      <span x-show="!loading">Load more</span>
      <span x-show="loading">Loading…</span>
    </button>
  </div>

  <!-- Bottom padding -->
  <div class="h-10"></div>

  <!-- Toast -->
  <div x-show="toast.visible"
       x-transition:enter="transition ease-out duration-200"
       x-transition:enter-start="opacity-0 translate-y-2"
       x-transition:enter-end="opacity-100 translate-y-0"
       x-transition:leave="transition ease-in duration-150"
       x-transition:leave-start="opacity-100 translate-y-0"
       x-transition:leave-end="opacity-0 translate-y-2"
       class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-gray-900 text-white text-sm
              px-5 py-2.5 rounded-xl shadow-lg whitespace-nowrap z-50"
       x-text="toast.message">
  </div>

</body>
</html>
