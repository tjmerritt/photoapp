<!DOCTYPE html>
<html lang="en" x-data="photoApp()" x-init="init()">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoApp</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap');

    :root {
      --brand:  #1a1a2e;
      --accent: #e94560;
      --surface:#f7f5f2;
      --card:   #ffffff;
      --muted:  #6b7280;
      --border: #e5e1db;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--brand); }
    h1,h2,h3 { font-family: 'DM Serif Display', serif; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    .label-chip:nth-child(1)  .label-name { background: hsl(210 70% 55%); }
    .label-chip:nth-child(2)  .label-name { background: hsl(257 70% 55%); }
    .label-chip:nth-child(3)  .label-name { background: hsl(330 70% 55%); }
    .label-chip:nth-child(4)  .label-name { background: hsl(30  70% 55%); }
    .label-chip:nth-child(5)  .label-name { background: hsl(160 60% 40%); }
    .label-chip:nth-child(6)  .label-name { background: hsl(15  70% 55%); }
    .label-chip:nth-child(7)  .label-name { background: hsl(190 70% 45%); }
    .label-chip:nth-child(8)  .label-name { background: hsl(280 60% 55%); }
    .label-chip:nth-child(n+9).label-name { background: hsl(45  70% 50%); }

    @keyframes fadeIn  { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes scaleIn { from { opacity:0; transform:scale(.95);      } to { opacity:1; transform:scale(1);      } }
    .animate-fadein  { animation: fadeIn  .25s ease both; }
    .animate-scalein { animation: scaleIn .2s  ease both; }

    .backdrop { background: rgba(26,26,46,.55); backdrop-filter: blur(3px); }
    .comment-clamp { display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; }

    .emoji-btn { cursor: pointer; transition: transform .15s; }
    .emoji-btn:hover  { transform: scale(1.2);  }
    .emoji-btn:active { transform: scale(1.05); }

    [x-cloak] { display: none !important; }
  </style>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { brand: '#1a1a2e', accent: '#e94560', muted: '#6b7280' },
          fontFamily: {
            serif: ['"DM Serif Display"', 'serif'],
            sans:  ['"DM Sans"', 'sans-serif'],
          },
        },
      },
    };
  </script>
</head>

<body class="min-h-screen flex flex-col">

<!-- ══ NAVBAR ══════════════════════════════════════════════════════════════ -->
<nav class="sticky top-0 z-40 bg-white border-b border-[var(--border)] shadow-sm">
  <div class="max-w-7xl mx-auto px-4 flex items-center gap-3 h-14">

    <!-- Hamburger -->
    <div class="relative" x-data="{ open: false }">
      <button @click="open = !open" class="p-2 rounded-lg hover:bg-gray-100 transition" aria-label="Menu">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div x-show="open" @click.outside="open=false" x-transition
           class="absolute left-0 top-10 bg-white border border-[var(--border)] rounded-xl shadow-lg w-44 py-1 animate-scalein">
        <a href="#" class="block px-4 py-2.5 text-sm hover:bg-gray-50 font-medium">Photos</a>
      </div>
    </div>

    <!-- Site icon -->
    <a href="/" class="flex items-center gap-2 shrink-0">
      <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
        </svg>
      </div>
      <span class="font-serif text-lg font-bold text-brand hidden sm:block">Phōtos</span>
    </a>

    <!-- Search -->
    <div class="flex-1 max-w-sm mx-2">
      <input type="search" placeholder="Search photos…"
             class="w-full px-3 py-1.5 text-sm border border-[var(--border)] rounded-full bg-gray-50 focus:outline-none focus:ring-2 focus:ring-accent/30 focus:border-accent/60 transition"
             @keydown.enter.prevent="showToast('Search is not yet implemented.')" />
    </div>

    <div class="ml-auto flex items-center gap-1">
      <!-- Random photo -->
      <button @click="loadPhoto('random', null)"
              class="p-2 rounded-lg hover:bg-gray-100 transition" aria-label="Random photo" title="Random photo">
        <svg class="w-5 h-5 text-muted" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 16v-4a8 8 0 0116 0v4M4 16l-2 2m2-2l2 2m12-2l-2 2m2-2l2 2"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0l2 2M4 4L2 6m16 2V4m0 0l2 2m-2-2l-2 2"/>
        </svg>
      </button>
      <!-- Test user switcher (dev only, until real login is wired up) -->
      <div class="relative" x-data="{ open: false }">
        <button @click="open = !open"
                class="flex items-center gap-1 px-2 py-1.5 rounded-lg hover:bg-gray-100 transition text-xs font-medium text-muted border border-dashed border-gray-300"
                title="Switch test user">
          <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-5-4M9 20H4v-2a4 4 0 015-4m0 0a4 4 0 110-8 4 4 0 010 8zm8-8a4 4 0 110-8 4 4 0 010 8z"/>
          </svg>
          <span x-text="testUser ? testUser.username : 'Guest'"></span>
          <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>
        <div x-show="open" @click.outside="open = false" x-transition
             class="absolute right-0 top-10 bg-white border border-[var(--border)] rounded-xl shadow-lg w-48 py-1 z-50 animate-scalein">
          <p class="px-3 py-1 text-xs font-semibold text-muted uppercase tracking-widest">Test Users</p>
          <button @click="selectTestUser(null); open = false"
                  :class="!testUser ? 'bg-gray-50 font-semibold' : ''"
                  class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50 text-muted">
            Guest (no auth)
          </button>
          <div class="border-t border-[var(--border)] my-1"></div>
          <template x-for="u in cannedUsers" :key="u.userid">
            <button @click="selectTestUser(u); open = false"
                    :class="currentUser && currentUser.userid ===u.userid ? 'bg-accent/10 font-semibold text-accent' : ''"
                    class="w-full text-left px-4 py-2 text-sm hover:bg-gray-50">
              <div x-text="u.username"></div>
              <div class="text-xs text-muted" x-text="u.fullname"></div>
            </button>
          </template>
        </div>
      </div>
      <!-- Profile / Auth -->
      <div class="relative" x-data="{ open: false }">
        <button @click="open = !open" class="p-1 rounded-lg hover:bg-gray-100 transition" title="Account">
          <template x-if="loggedInUser">
            <img :src="avatarSrc(loggedInUser, 32)" class="w-7 h-7 rounded-full object-cover" />
          </template>
          <template x-if="!loggedInUser">
            <svg class="w-5 h-5 text-muted" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A4 4 0 019 16h6a4 4 0 013.879 1.804M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </template>
        </button>

        <!-- Auth panel -->
        <div x-show="open" @click.outside="open = false" x-transition
             class="absolute right-0 top-11 bg-white border border-[var(--border)] rounded-2xl shadow-2xl w-80 p-5 z-50 animate-scalein">

          <!-- Logged in state -->
          <template x-if="loggedInUser">
            <div>
              <div class="flex items-center gap-3 mb-4">
                <img :src="avatarSrc(loggedInUser, 48)"
                     class="w-12 h-12 rounded-full object-cover" />
                <div>
                  <div class="font-semibold text-sm" x-text="loggedInUser.username"></div>
                  <div class="text-xs text-muted" x-text="loggedInUser.email"></div>
                </div>
              </div>
              <button @click="logout(); open = false"
                      class="w-full bg-gray-100 hover:bg-gray-200 text-brand text-sm py-2 rounded-xl transition font-medium">
                Sign Out
              </button>
            </div>
          </template>

          <!-- Logged out state -->
          <template x-if="!loggedInUser">
            <div x-data="{
              authTab: 'login', authEmail: '', authUsername: '', authPassword: '',
              authError: '', authLoading: false,
              async doLogin() {
                this.authError = ''; this.authLoading = true;
                try {
                  const r = await fetch('/auth/login', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ email: this.authEmail, password: this.authPassword })
                  });
                  const d = await r.json();
                  if (!r.ok) throw new Error(d.error || 'Login failed');
                  document.dispatchEvent(new CustomEvent('photoapp:auth-success', { detail: { ...d, loggedIn: true, profileImage: null } }));
                  this.authEmail = this.authPassword = '';
                } catch(e) { this.authError = e.message; }
                this.authLoading = false;
              },
              async doRegister() {
                this.authError = ''; this.authLoading = true;
                try {
                  const r = await fetch('/auth/register', {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ username: this.authUsername, email: this.authEmail, password: this.authPassword })
                  });
                  const d = await r.json();
                  if (!r.ok) throw new Error(d.error || 'Registration failed');
                  document.dispatchEvent(new CustomEvent('photoapp:auth-success', { detail: { ...d, loggedIn: true, profileImage: null } }));
                  this.authEmail = this.authUsername = this.authPassword = '';
                } catch(e) { this.authError = e.message; }
                this.authLoading = false;
              }
            }">

              <!-- Google -->
              <a href="/auth/google"
                 class="flex items-center justify-center gap-3 w-full border border-[var(--border)] rounded-xl py-2.5 mb-3 hover:bg-gray-50 transition text-sm font-medium">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Sign in with Google
              </a>

              <!-- Apple -->
              <a href="/auth/apple"
                 class="flex items-center justify-center gap-3 w-full bg-black text-white rounded-xl py-2.5 mb-4 hover:bg-gray-900 transition text-sm font-medium">
                <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.07c1.22.07 2.08.67 2.82.68.96-.15 1.84-.78 2.96-.83 1.28-.07 2.5.54 3.24 1.52-2.79 1.68-2.32 5.34.28 6.66-.53 1.47-1.28 2.93-2.3 4.18zM12.03 7c-.09-2.29 1.79-4.27 3.97-4.35.28 2.51-2.3 4.43-3.97 4.35z"/></svg>
                Sign in with Apple
              </a>

              <!-- Divider -->
              <div class="flex items-center gap-2 mb-4">
                <div class="flex-1 border-t border-[var(--border)]"></div>
                <span class="text-xs text-muted">or</span>
                <div class="flex-1 border-t border-[var(--border)]"></div>
              </div>

              <!-- Login / Register tabs -->
              <div class="flex rounded-xl bg-gray-100 p-1 mb-4">
                <button @click="authTab = 'login'; authError = ''"
                        :class="authTab === 'login' ? 'bg-white shadow text-brand' : 'text-muted'"
                        class="flex-1 text-sm py-1.5 rounded-lg font-medium transition">Login</button>
                <button @click="authTab = 'register'; authError = ''"
                        :class="authTab === 'register' ? 'bg-white shadow text-brand' : 'text-muted'"
                        class="flex-1 text-sm py-1.5 rounded-lg font-medium transition">Register</button>
              </div>

              <!-- Error -->
              <p x-show="authError" x-text="authError" class="text-xs text-red-500 mb-3 -mt-2"></p>

              <!-- Login form -->
              <template x-if="authTab === 'login'">
                <div class="space-y-3">
                  <input x-model="authEmail" type="text" placeholder="Email or username"
                         class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30" />
                  <input x-model="authPassword" type="password" placeholder="Password"
                         @keydown.enter="doLogin()"
                         class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30" />
                  <button @click="doLogin()" :disabled="authLoading"
                          class="w-full bg-brand text-white py-2.5 rounded-xl font-medium hover:bg-accent transition text-sm disabled:opacity-40">
                    <span x-text="authLoading ? 'Signing in…' : 'Log In'"></span>
                  </button>
                </div>
              </template>

              <!-- Register form -->
              <template x-if="authTab === 'register'">
                <div class="space-y-3">
                  <input x-model="authUsername" type="text" placeholder="Username"
                         class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30" />
                  <input x-model="authEmail" type="email" placeholder="Email"
                         class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30" />
                  <input x-model="authPassword" type="password" placeholder="Password (min 8 chars)"
                         @keydown.enter="doRegister()"
                         class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30" />
                  <button @click="doRegister()" :disabled="authLoading"
                          class="w-full bg-brand text-white py-2.5 rounded-xl font-medium hover:bg-accent transition text-sm disabled:opacity-40">
                    <span x-text="authLoading ? 'Creating account…' : 'Create Account'"></span>
                  </button>
                </div>
              </template>

            </div>
          </template>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- ══ MAIN ═════════════════════════════════════════════════════════════════ -->
<main class="flex-1 max-w-7xl w-full mx-auto px-4 py-8" x-cloak>

  <!-- Loading -->
  <div x-show="loading" class="flex items-center justify-center py-32">
    <div class="w-10 h-10 border-4 border-accent/30 border-t-accent rounded-full animate-spin"></div>
  </div>

  <template x-if="photo && !loading">
    <div class="animate-fadein space-y-4">

      <!-- Photo + Related -->
      <div class="flex gap-4 items-start">
        <div class="flex-1 min-w-0 bg-white rounded-2xl overflow-hidden ring-1 ring-[var(--border)] shadow-sm">
          <div class="bg-gray-100">
            <img :src="photo.image.url" :alt="photo.title.text"
                 :class="photo.image.height > photo.image.width
                   ? 'w-full object-contain max-h-[85vh]'
                   : 'w-full object-cover max-h-[70vh]'"
                 loading="eager" />
          </div>
        </div>

        <template x-if="photo.related && photo.related.length">
          <div class="w-36 shrink-0 hidden md:flex flex-col gap-3 overflow-y-auto pr-1"
               :style="photo.image.height > photo.image.width ? 'max-height:85vh' : 'max-height:70vh'">
            <template x-for="rel in photo.related" :key="rel.photoid">
              <a href="#" @click.prevent="loadPhoto(rel.photoid)" class="block rounded-xl overflow-hidden ring-1 ring-[var(--border)] hover:ring-accent/60 transition shadow-sm shrink-0">
                <img :src="rel.imageurl" :alt="rel.photoid" class="w-full h-24 object-cover hover:opacity-90 transition" />
              </a>
            </template>
          </div>
        </template>
      </div>

      <!-- Title + Description -->
      <div class="bg-white rounded-2xl ring-1 ring-[var(--border)] shadow-sm px-6 py-5"
           x-data="titleEditor(photo, () => authHeaders())">
        <!-- View mode -->
        <template x-if="!editing">
          <h1 class="text-3xl font-serif"
              :class="photo.title.canedit ? 'cursor-pointer hover:text-gray-400 transition-colors' : ''"
              :title="photo.title.canedit ? 'Click to edit title' : ''"
              @click="photo.title.canedit && startEdit()"
              x-text="photo.title.text">
          </h1>
        </template>
        <!-- Edit mode -->
        <template x-if="editing">
          <div class="flex items-center gap-2">
            <input x-ref="titleInput"
                   x-model="draft"
                   @keydown.enter.prevent="save()"
                   @keydown.escape.prevent="cancel()"
                   @blur="save()"
                   class="flex-1 text-3xl font-serif bg-transparent border-b-2 border-gray-300 focus:outline-none" />
            <button @mousedown.prevent="cancel()"
                    class="text-muted hover:text-accent transition text-2xl leading-none flex-shrink-0"
                    title="Cancel">&times;</button>
          </div>
        </template>
        <p class="mt-2 text-muted leading-relaxed text-sm" x-text="photo.description"></p>
      </div>

      <!-- Labels -->
      <div class="bg-white rounded-2xl ring-1 ring-[var(--border)] shadow-sm px-6 py-4">
        <div class="flex flex-wrap gap-2 items-center">
          <template x-for="label in photo.labels" :key="label.labelid">
            <div class="label-chip relative flex items-stretch rounded-full overflow-visible shadow-sm text-sm transition-shadow"
                 :class="activeLabelID === label.labelid
                   ? 'ring-2 ring-accent'
                   : 'ring-1 ring-[var(--border)]'"
                 x-data="{ hovered: false }" @mouseenter="hovered = true" @mouseleave="hovered = false">
              <span class="label-name flex items-center px-3 py-1 text-white font-medium text-xs rounded-l-full" x-text="label.name"></span>
              <span class="flex items-center px-3 py-1 bg-white text-brand font-medium rounded-r-full cursor-pointer hover:bg-gray-50 transition-colors"
                    @click.stop="loadPhoto(photo.photoid, activeLabelID === label.labelid ? null : label.labelid)"
                    :title="activeLabelID === label.labelid ? 'Clear label filter' : 'Find photos with this label'"
                    x-text="label.value"></span>
              <template x-if="testUser && hovered">
                <span class="absolute left-1/2 -translate-x-1/2 top-full flex flex-col items-center z-10" style="padding-top:3px">
                  <span class="flex items-center gap-1 bg-white border border-[var(--border)] rounded-lg shadow-md px-1 py-0.5">
                    <button @click.stop="openLabelModal(label)"
                            class="w-6 h-6 flex items-center justify-center rounded hover:bg-gray-100 text-muted hover:text-brand transition"
                            title="Edit">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536M9 13l6.586-6.586a2 2 0 112.828 2.828L11.828 15.828a2 2 0 01-1.414.586H9v-2a2 2 0 01.586-1.414z"/>
                      </svg>
                    </button>
                    <button @click.stop="deleteLabel(label)"
                            class="w-6 h-6 flex items-center justify-center rounded hover:bg-red-50 text-muted hover:text-red-500 transition"
                            title="Delete">
                      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                      </svg>
                    </button>
                  </span>
                </span>
              </template>
            </div>
          </template>
          <template x-if="currentUser">
            <button @click="openLabelModal(null)"
                    class="w-8 h-8 rounded-full bg-gray-200 hover:bg-accent hover:text-white transition flex items-center justify-center text-lg font-light shadow-sm"
                    title="Add label">+</button>
          </template>
        </div>
      </div>

      <!-- Emojis -->
      <div class="bg-white rounded-2xl ring-1 ring-[var(--border)] shadow-sm px-6 py-4">
        <div class="flex flex-wrap items-center gap-2">
          <template x-for="em in photo.emojis" :key="em.emojiid">
            <div class="relative" x-data="{ holding: false, holdTimer: null }">
              <button class="emoji-btn flex items-center gap-1.5 rounded-full px-3 py-1.5 text-sm shadow-sm select-none border transition-colors"
                      :class="testUser && em.users && em.users.some(u => u.id === testUser.userid)
                        ? 'bg-teal-50 border-teal-300 text-teal-700'
                        : 'bg-white border-[var(--border)]'"
                      @click="toggleReaction(em)"
                      @mousedown="holdTimer = setTimeout(() => holding = true, 600)"
                      @mouseup="clearTimeout(holdTimer)"
                      @mouseleave="clearTimeout(holdTimer)"
                      @touchstart.prevent="holdTimer = setTimeout(() => holding = true, 600)"
                      @touchend="clearTimeout(holdTimer)"
                      :title="testUser && em.users && em.users.some(u => u.id === testUser.userid) ? 'Click to remove reaction' : 'Click to react · Hold to see who reacted'">
                <template x-if="em.imageurl">
                  <img :src="em.imageurl" :alt="em.alttext" class="w-5 h-5 object-contain" />
                </template>
                <template x-if="!em.imageurl">
                  <span class="text-lg" x-text="em.emoji"></span>
                </template>
                <span class="font-medium text-xs" x-text="em.count"></span>
              </button>

<!-- ══ ALPINE.JS ═════════════════════════════════════════════════════════════ -->
<script>
  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      const d = new Date(dateStr), now = new Date(), diff = (now - d) / 1000;
      if (diff < 5)     return 'just now';
      if (diff < 60)     return `${diff}s ago`;
      if (diff < 3600)   return `${Math.floor(diff/60)}m ago`;
      if (diff < 86400)  return `${Math.floor(diff/3600)}h ago`;
      if (diff < 604800) return `${Math.floor(diff/86400)}d ago`;
      return d.toLocaleDateString(undefined, { year:'numeric', month:'short', day:'numeric' });
    } catch { return dateStr; }
  }

  // commentsPanel manages the top-level comment list + new comment posting.
  function commentsPanel(photo, getUser, getHeaders) {
    return {
      comments:    photo.comments || [],
      newText:     '',
      posting:     false,
      loadingMore: false,

      get testUser() { return getUser(); },

      async post() {
        const text = this.newText.trim();
        if (!text || !getUser()) return;
        this.posting = true;
        try {
          const resp = await fetch(`/api/v1/comments?photoid=${encodeURIComponent(photo.photoid)}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', ...getHeaders() },
            body: JSON.stringify({ comment: text }),
          });
          if (!resp.ok) throw new Error((await resp.json().catch(() => ({}))).error || `HTTP ${resp.status}`);
          const c = await resp.json();
          this.comments.unshift(c);
          this.newText = '';
        } catch(e) {
          document.dispatchEvent(new CustomEvent('photoapp:toast', { detail: `Failed to post: ${e.message}` }));
        }
        this.posting = false;
      },

      async loadMore() {
        if (!photo.commentsurl) return;
        this.loadingMore = true;
        try {
          const resp = await fetch(photo.commentsurl);
          const data = await resp.json();
          this.comments.push(...(data.comments || []));
          photo.commentsurl = data.pages?.next ? data.pages.next.replace('/api/v1/comments', '/api/v1/comments') : null;
        } catch(e) {
          document.dispatchEvent(new CustomEvent('photoapp:toast', { detail: `Failed to load more: ${e.message}` }));
        }
        this.loadingMore = false;
      },
    };
  }

  // commentItem manages a single comment row: editing, deleting, replies.
  // depth is 0-based; Reply is hidden at depth >= 5 (enforcing a 6-level max).
  function commentItem(c, photoid, getUser, getHeaders, depth = 0) {
    return {
      c,
      depth,
      photoid,
      getUser,
      getHeaders,
      expanded:     false,
      clampLines:   4,
      needsClamp:   false,
      editing:      false,
      editText:     '',
      saving:       false,
      showingReplies: false,
      loadingReplies: false,
      replyOpen:    false,
      replyText:    '',
      postingReply: false,
      replies:      [],

      get testUser()  { return getUser(); },
      get canReply()  { return !!getUser() && depth < 5; },

      checkClamp() {
        this.$nextTick(() => {
          const el = this.$refs.commentBody;
          if (el) {
            const lineH = parseFloat(getComputedStyle(el).lineHeight) || 20;
            this.needsClamp = el.scrollHeight > lineH * this.clampLines + 4;
          }
        });
      },

      showMore() {
        this.clampLines += 1;
        const el = this.$refs.commentBody;
        if (el) {
          const lh = parseFloat(getComputedStyle(el).lineHeight) || 20;
          if (el.scrollHeight <= lh * this.clampLines + 4) this.expanded = true;
        }
      },

      startEdit() {
        this.editText = this.c.comment;
        this.editing  = true;
      },
      cancelEdit() { this.editing = false; },

      async saveEdit() {
        const text = this.editText.trim();
        if (!text) return;
        this.saving = true;
        try {
          const resp = await fetch(`/api/v1/comments/${encodeURIComponent(this.c.commentid)}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', ...getHeaders() },
            body: JSON.stringify({ comment: text }),
          });
          if (!resp.ok) throw new Error((await resp.json().catch(() => ({}))).error || `HTTP ${resp.status}`);
          const updated = await resp.json();
          this.c.comment = updated.comment;
          this.editing = false;
        } catch(e) {
          document.dispatchEvent(new CustomEvent('photoapp:toast', { detail: `Edit failed: ${e.message}` }));
        }
        this.saving = false;
      },

      async deleteComment() {
        if (!confirm('Delete this comment?')) return;
        try {
          const resp = await fetch(`/api/v1/comments/${encodeURIComponent(this.c.commentid)}`, {
            method: 'DELETE', headers: getHeaders(),
          });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          // Remove from parent list via event
          document.dispatchEvent(new CustomEvent('photoapp:comment-deleted', { detail: this.c.commentid }));
        } catch(e) {
          document.dispatchEvent(new CustomEvent('photoapp:toast', { detail: `Delete failed: ${e.message}` }));
        }
      },

      async loadReplies() {
        this.showingReplies  = true;
        this.loadingReplies  = true;
        try {
          const resp = await fetch(`/api/v1/comments?photoid=${encodeURIComponent(photoid)}&parentid=${encodeURIComponent(this.c.commentid)}`);
          const data = await resp.json();
          this.replies = data.comments || [];
        } catch(e) { console.error('Failed to load replies', e); }
        this.loadingReplies = false;
      },

      async postReply() {
        const text = this.replyText.trim();
        if (!text || !getUser()) return;
        this.postingReply = true;
        try {
          const resp = await fetch(
            `/api/v1/comments?photoid=${encodeURIComponent(photoid)}&parentid=${encodeURIComponent(this.c.commentid)}`,
            {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', ...getHeaders() },
              body: JSON.stringify({ comment: text }),
            }
          );
          if (!resp.ok) throw new Error((await resp.json().catch(() => ({}))).error || `HTTP ${resp.status}`);
          const reply = await resp.json();
          this.replies.push(reply);
          this.c.replycount = (this.c.replycount || 0) + 1;
          this.replyText    = '';
          this.replyOpen    = false;
          this.showingReplies = true;
        } catch(e) {
          document.dispatchEvent(new CustomEvent('photoapp:toast', { detail: `Reply failed: ${e.message}` }));
        }
        this.postingReply = false;
      },

      formatDate,
    };
  }

  // Skintone swatch colours in Fitzpatrick order.
  const SKINTONE_COLORS = {
    'light':        '#FFDBB4',
    'medium-light': '#EAC085',
    'medium':       '#C68642',
    'medium-dark':  '#8D5524',
    'dark':         '#4A2912',
  };

  function emojiPicker(photo) {
    function getAuthHeaders() {
      return window._testUserID ? { 'X-User-ID': window._testUserID } : {};
    }
    return {
      photo,
      search:     '',
      emojis:     [],
      total:      0,
      offset:     0,
      limit:      64,
      loading:    false,
      reactedIds: new Set(),

      // Skintone picker state
      skintoneTarget: null,    // the base emoji whose variants we're showing
      skintoneVariants: [],    // loaded variant list (includes base at index 0)
      skintoneLoading: false,

      async init() {
        if (getAuthHeaders()['X-User-ID']) {
          const uid = getAuthHeaders()['X-User-ID'];
          (photo.emojis || []).forEach(em => {
            if (em.users && em.users.some(u => u.id === uid)) {
              this.reactedIds.add(em.emojiid);
            }
          });
        }
        await this.load();
      },

      async load() {
        this.loading = true;
        try {
          const params = new URLSearchParams({ limit: this.limit, offset: this.offset });
          if (this.search) params.set('search', this.search);
          const resp = await fetch(`/api/v1/emoji/types?${params}`);
          const data = await resp.json();
          this.emojis = data.emojis || [];
          this.total  = data.total  || 0;
        } catch(e) {
          document.dispatchEvent(new CustomEvent('photoapp:toast', { detail: `Failed to load emojis: ${e.message}` }));
        }
        this.loading = false;
      },

      doSearch() { this.offset = 0; this.skintoneTarget = null; this.load(); },
      nextPage()  { this.offset += this.limit; this.skintoneTarget = null; this.load(); },
      prevPage()  { this.offset = Math.max(0, this.offset - this.limit); this.skintoneTarget = null; this.load(); },

      skintoneColor(tone) { return SKINTONE_COLORS[tone] || '#FFD700'; },

      async openSkintone(em) {
        if (this.skintoneTarget?.emojiid === em.emojiid) {
          this.skintoneTarget = null; // toggle off
          return;
        }
        this.skintoneTarget  = em;
        this.skintoneVariants = [];
        this.skintoneLoading  = true;
        try {
          const resp = await fetch(`/api/v1/emoji/variants?hexcode=${encodeURIComponent(em.hexcode)}`);
          const data = await resp.json();
          this.skintoneVariants = data.variants || [];
        } catch(e) {
          document.dispatchEvent(new CustomEvent('photoapp:toast', { detail: `Failed to load variants: ${e.message}` }));
        }
        this.skintoneLoading = false;
      },

      handleEmojiClick(em) {
        if (em.has_skintones) {
          this.openSkintone(em);
        } else {
          this.skintoneTarget = null;
          this.react(em);
        }
      },

      async react(em) {
        const headers = getAuthHeaders();
        if (!headers['X-User-ID']) {
          document.dispatchEvent(new CustomEvent('photoapp:toast', { detail: 'Select a user to react.' }));
          return;
        }
        const alreadyReacted = this.reactedIds.has(em.emojiid);
        const method = alreadyReacted ? 'DELETE' : 'POST';
        try {
          const resp = await fetch(
            `/api/v1/emoji/react?photoid=${encodeURIComponent(this.photo.photoid)}&emojiid=${encodeURIComponent(em.emojiid)}`,
            { method, headers }
          );
          if (!resp.ok) {
            const e = await resp.json().catch(() => ({}));
            throw new Error(e.error || `HTTP ${resp.status}`);
          }
          if (alreadyReacted) {
            this.reactedIds.delete(em.emojiid);
            const uid = window._testUserID;
            const existing = this.photo.emojis.find(e => e.emojiid === em.emojiid);
            if (existing) {
              existing.count--;
              if (uid) existing.users = (existing.users || []).filter(u => u.id !== uid);
              if (existing.count <= 0) this.photo.emojis = this.photo.emojis.filter(e => e.emojiid !== em.emojiid);
            }
          } else {
            this.reactedIds.add(em.emojiid);
            const uid = window._testUserID;
            const cu = this.currentUser;
            const userEntry = uid ? { id: uid, name: cu?.username || '', tn: cu?.profileImage || null } : null;
            const existing = this.photo.emojis.find(e => e.emojiid === em.emojiid);
            if (existing) {
              existing.count++;
              if (userEntry) existing.users = [...(existing.users || []), userEntry];
            } else {
              this.photo.emojis.push({ emojiid: em.emojiid, emoji: em.emoji, imageurl: em.imageurl, alttext: em.alttext, count: 1, users: userEntry ? [userEntry] : [] });
            }
          }
        } catch(e) {
          document.dispatchEvent(new CustomEvent('photoapp:toast', { detail: `Reaction failed: ${e.message}` }));
        }
      },
    };
  }

  function labelEditor(data, photo, getAuthHeaders) {
    return {
      photo,
      getAuthHeaders,
      editingLabel: data,        // null = new, object = edit existing

      knownNames:  [],
      knownValues: [],
      loadingValues: false,

      selectedName:  data ? data.name  : '',
      customName:    '',
      nameIsOther:   false,

      selectedValue: '',
      customValue:   '',
      valueIsOther:  false,

      saving: false,

      get effectiveName()  { return this.nameIsOther  ? this.customName.trim()  : this.selectedName; },
      get effectiveValue() { return this.valueIsOther ? this.customValue.trim() : this.selectedValue; },

      async init() {
        // Load known names.
        try {
          const r = await fetch('/api/v1/label-names');
          const d = await r.json();
          this.knownNames = d.names || [];
        } catch { this.knownNames = []; }

        // If editing, pre-select name and load its values.
        if (this.editingLabel) {
          if (!this.knownNames.includes(this.editingLabel.name)) {
            this.knownNames = [this.editingLabel.name, ...this.knownNames];
          }
          await this.loadValues(this.editingLabel.name);
          // Pre-select value or fall back to "other".
          if (this.knownValues.includes(this.editingLabel.value)) {
            this.selectedValue = this.editingLabel.value;
          } else {
            this.valueIsOther = true;
            this.customValue  = this.editingLabel.value;
          }
        } else if (this.knownNames.length === 0) {
          // No known names yet — go straight to free-text.
          this.nameIsOther = true;
          this.$nextTick(() => this.$refs.customNameInput?.focus());
        }
      },

      async onNameChange() {
        if (this.selectedName === '__other__') {
          this.nameIsOther  = true;
          this.selectedName = '';
          this.$nextTick(() => this.$refs.customNameInput?.focus());
          return;
        }
        this.selectedValue = '';
        this.valueIsOther  = false;
        this.customValue   = '';
        await this.loadValues(this.selectedName);
      },

      async loadValues(name) {
        if (!name) return;
        this.loadingValues = true;
        try {
          const r = await fetch(`/api/v1/label-values?name=${encodeURIComponent(name)}`);
          const d = await r.json();
          this.knownValues = d.values || [];
        } catch { this.knownValues = []; }
        this.loadingValues = false;
        // If only one known value, pre-select it.
        if (this.knownValues.length === 1) this.selectedValue = this.knownValues[0];
        // If no known values go straight to free-text.
        if (this.knownValues.length === 0) this.valueIsOther = true;
      },

      async save() {
        const name  = this.effectiveName;
        const value = this.effectiveValue;
        if (!name || !value) return;
        this.saving = true;
        try {
          let resp;
          if (this.editingLabel) {
            resp = await fetch(`/api/v1/labels/${encodeURIComponent(this.editingLabel.labelid)}`, {
              method: 'PATCH',
              headers: { 'Content-Type': 'application/json', ...this.getAuthHeaders() },
              body: JSON.stringify({ value }),  // name is immutable when editing
            });
          } else {
            resp = await fetch(`/api/v1/labels?photoid=${encodeURIComponent(this.photo.photoid)}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', ...this.getAuthHeaders() },
              body: JSON.stringify({ name, value }),
            });
          }
          if (!resp.ok) {
            const e = await resp.json().catch(() => ({}));
            throw new Error(e.error || `HTTP ${resp.status}`);
          }
          const saved = await resp.json();
          if (this.editingLabel) {
            const idx = this.photo.labels.findIndex(l => l.labelid === saved.labelid);
            if (idx !== -1) this.photo.labels[idx] = saved;
          } else {
            this.photo.labels.push(saved);
          }
          document.dispatchEvent(new CustomEvent('photoapp:close-label-modal'));
        } catch(e) {
          document.dispatchEvent(new CustomEvent('photoapp:toast', { detail: `Save failed: ${e.message}` }));
        }
        this.saving = false;
      },
    };
  }

  function titleEditor(photo, getAuthHeaders) {
    return {
      photo,
      getAuthHeaders,
      editing: false,
      draft: '',
      original: '',

      startEdit() {
        this.original = this.photo.title.text;
        this.draft    = this.photo.title.text;
        this.editing  = true;
        this.$nextTick(() => {
          const el = this.$refs.titleInput;
          if (el) { el.focus(); el.select(); }
        });
      },

      cancel() {
        this.draft   = this.original;
        this.editing = false;
      },

      async save() {
        if (!this.editing) return;
        const newTitle = this.draft.trim();
        // Treat empty or unchanged as a cancel.
        if (!newTitle || newTitle === this.original) {
          this.cancel();
          return;
        }
        this.editing = false;
        try {
          const resp = await fetch(
            `/api/v1/photo?photoid=${encodeURIComponent(this.photo.photoid)}`,
            {
              method: 'PATCH',
              headers: {
                'Content-Type': 'application/json',
                ...this.getAuthHeaders(),
              },
              body: JSON.stringify({ title: newTitle }),
            }
          );
          if (!resp.ok) {
            const err = await resp.json().catch(() => ({}));
            throw new Error(err.error || `HTTP ${resp.status}`);
          }
          this.photo.title.text = newTitle;
          this.original         = newTitle;
        } catch (e) {
          // Roll back on failure and show error.
          this.photo.title.text = this.original;
          // Bubble up to parent photoApp showToast if accessible.
          document.dispatchEvent(new CustomEvent('photoapp:toast', { detail: `Save failed: ${e.message}` }));
        }
      },
    };
  }

  // Returns the avatar URL for a user object that may have .profileImage set.
  // Falls back to the generated Codeberg-style avatar endpoint if none is set.
  function avatarSrc(user, size = 48) {
    if (!user) return `https://i.pravatar.cc/${size}`;
    if (user.profileImage) return user.profileImage;
    if (user.email) {
      // Compute MD5 client-side for the generated avatar URL.
      // (A simple approach: just use the userid as seed for pravatar as fallback.)
      return `/avatars/${user.userid}`;
    }
    return `https://i.pravatar.cc/${size}?u=${user.userid || ''}`;
  }

  function photoApp() {
    return {
      photo: null,
      loading: true,
      error: null,

      // Real auth — populated from /auth/me on page load.
      loggedInUser: null,

      // Dev test-user switcher — still useful when OAuth isn't configured.
      testUser: null,
      cannedUsers: [
        { userid: '11111111-0000-0000-0000-000000000001', username: 'ansel_b',  fullname: 'Ansel Blackwood' },
        { userid: '11111111-0000-0000-0000-000000000002', username: 'lena_ray', fullname: 'Lena Raynor'     },
        { userid: '11111111-0000-0000-0000-000000000003', username: 'marco_v',  fullname: 'Marco Vidal'     },
        { userid: '11111111-0000-0000-0000-000000000004', username: 'suki_tm',  fullname: 'Suki Tamamoto'   },
        { userid: '11111111-0000-0000-0000-000000000005', username: 'dev_null', fullname: 'Dev Null'        },
      ],

      // Returns auth headers: real session is a cookie (transparent to JS);
      // fall back to X-User-ID for the dev test-user switcher.
      authHeaders() {
        if (this.loggedInUser) return {}; // cookie is sent automatically
        return this.testUser ? { 'X-User-ID': this.testUser.userid } : {};
      },

      // Effective user for UI decisions (edit/delete controls, reaction ownership).
      get currentUser() {
        return this.loggedInUser || this.testUser || null;
      },

      selectTestUser(user) {
        this.testUser = user;
        window._testUserID = user?.userid || null;
        if (this.photo) this.loadPhoto(this.photo.photoid);
      },

      async logout() {
        await fetch('/auth/logout', { method: 'POST' });
        this.loggedInUser = null;
        window._testUserID = null;
        if (this.photo) this.loadPhoto(this.photo.photoid);
      },


      labelModal: false,
      labelModalData: null,   // null = add, label object = edit
      emojiPickerOpen: false,

      toast: { visible: false, message: '', timer: null },


      activeLabelID: null,

      async init() {
        // Check if the user is already logged in via session cookie.
        try {
          const me = await fetch('/auth/me').then(r => r.json());
          if (me.loggedIn) {
            this.loggedInUser = me;
            window._testUserID = me.userid;
          }
        } catch { /* non-fatal */ }

        const params = new URLSearchParams(window.location.search);
        const photoid = params.get('photoid') || 'random';
        const label   = params.get('label') || null;
        this.activeLabelID = label;
        await this.loadPhoto(photoid, label);
        document.addEventListener('photoapp:toast', (e) => this.showToast(e.detail));
        document.addEventListener('photoapp:close-label-modal', () => { this.labelModal = false; });
        document.addEventListener('photoapp:comment-deleted', (e) => {
          if (this.photo) this.photo.comments = this.photo.comments.filter(c => c.commentid !== e.detail);
        });
        document.addEventListener('photoapp:auth-success', (e) => {
          this.loggedInUser = e.detail;
          window._testUserID = e.detail.userid;
          if (this.photo) this.loadPhoto(this.photo.photoid);
        });
      },

      async loadPhoto(photoid, labelID) {
        // labelID=undefined preserves activeLabelID; null clears it explicitly.
        if (labelID !== undefined) this.activeLabelID = labelID || null;
        this.loading = true;
        this.error = null;
        try {
          let url;
          if (photoid === 'random') {
            url = '/api/v1/photo?random=true';
          } else {
            url = `/api/v1/photo?photoid=${encodeURIComponent(photoid)}`;
            if (this.activeLabelID) url += `&label=${encodeURIComponent(this.activeLabelID)}`;
          }
          const resp = await fetch(url, { headers: this.authHeaders() });
          if (!resp.ok) throw new Error(`Photo not found (${resp.status})`);
          this.photo = await resp.json();
          // Keep the URL in sync so bookmarks and the back button work.
          const qs = new URLSearchParams({ photoid: this.photo.photoid });
          if (this.activeLabelID) qs.set('label', this.activeLabelID);
          window.history.replaceState(null, '', `?${qs}`);
        } catch (e) { this.error = e.message; }
        this.loading = false;
      },

      showToast(message) {
        clearTimeout(this.toast.timer);
        this.toast.message = message;
        this.toast.visible = true;
        this.toast.timer = setTimeout(() => { this.toast.visible = false; }, 3500);
      },

      async toggleReaction(em) {
        if (!this.testUser) { this.showToast('Select a user to react.'); return; }
        const uid = this.testUser.userid;
        const alreadyReacted = em.users && em.users.some(u => u.id === uid);
        const method = alreadyReacted ? 'DELETE' : 'POST';
        try {
          const resp = await fetch(
            `/api/v1/emoji/react?photoid=${encodeURIComponent(this.photo.photoid)}&emojiid=${encodeURIComponent(em.emojiid)}`,
            { method, headers: this.authHeaders() }
          );
          if (!resp.ok) {
            const e = await resp.json().catch(() => ({}));
            throw new Error(e.error || `HTTP ${resp.status}`);
          }
          if (alreadyReacted) {
            em.count--;
            em.users = (em.users || []).filter(u => u.id !== uid);
            if (em.count <= 0) this.photo.emojis = this.photo.emojis.filter(e => e.emojiid !== em.emojiid);
          } else {
            em.count++;
            const cu2 = this.currentUser;
            em.users = [...(em.users || []), { id: uid, name: cu2?.username || '', tn: cu2?.profileImage || null }];
          }
        } catch(e) {
          this.showToast(`Reaction failed: ${e.message}`);
        }
      },

      openLabelModal(label) {
        this.labelModalData = label;
        this.labelModal = true;
      },

      async deleteLabel(label) {
        if (!this.currentUser) { this.showToast('Select a user to delete labels.'); return; }
        try {
          const resp = await fetch(`/api/v1/labels/${encodeURIComponent(label.labelid)}`, {
            method: 'DELETE',
            headers: this.authHeaders(),
          });
          if (!resp.ok) {
            const e = await resp.json().catch(() => ({}));
            throw new Error(e.error || `HTTP ${resp.status}`);
          }
          this.photo.labels = this.photo.labels.filter(l => l.labelid !== label.labelid);
        } catch(e) {
          this.showToast(`Delete failed: ${e.message}`);
        }
      },

    };
  }
</script>
