<!DOCTYPE html>
<html lang="en" x-data="photoApp" x-init="init()" @open-emoji-picker.window="$store.ui.emojiPickerOpen = true">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhotoApp</title>

  <!-- Compiled Tailwind CSS (generated by scripts/build-tailwind.sh) -->
  <link rel="stylesheet" href="/tailwind.css">
  <!-- App logic — registers alpine:init listener before alpinejs.min.js fires it. -->
  <script src="/app.js"></script>
  <!-- Alpine.js CSP build -->
  <script defer src="/alpinejs.min.js"></script>
 
  <link rel="stylesheet" href="/fonts.css">

  <style>

    :root {
      --brand:  #1a1a2e;
      --accent: #e94560;
      --surface:#f7f5f2;
      --card:   #ffffff;
      --muted:  #6b7280;
      --border: #e5e1db;
    }

    body { font-family: 'DM Sans', sans-serif; background: var(--surface); color: var(--brand); }
    h1,h2,h3 { font-family: 'DM Serif Display', serif; }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }

    /* Label colors are assigned by name via labelColorFor() in app.js */

    @keyframes fadeIn  { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    @keyframes scaleIn { from { opacity:0; transform:scale(.95);      } to { opacity:1; transform:scale(1);      } }
    .animate-fadein  { animation: fadeIn  .25s ease both; }
    .animate-scalein { animation: scaleIn .2s  ease both; }

    .backdrop { background: rgba(26,26,46,.55); backdrop-filter: blur(3px); }
    .comment-clamp { display: -webkit-box; -webkit-box-orient: vertical; overflow: hidden; }

    .emoji-btn { cursor: pointer; transition: transform .15s; }
    .emoji-btn:hover  { transform: scale(1.2);  }
    .emoji-btn:active { transform: scale(1.05); }

    [x-cloak] { display: none !important; }

    /* Show a neutral circle when a profile image is missing */
    img.avatar { background-color: #e5e7eb; }
  </style>

</head>

<body class="min-h-screen flex flex-col">

<!-- ══ NAVBAR ══════════════════════════════════════════════════════════════ -->
<nav class="sticky top-0 z-40 bg-white border-b border-[var(--border)] shadow-sm">
  <div class="max-w-7xl mx-auto px-4 flex items-center gap-3 h-14">

    <!-- Hamburger -->
    <div class="relative" x-data="{ open: false }">
      <button @click="open = !open" class="p-2 rounded-lg hover:bg-gray-100 transition" aria-label="Menu">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
        </svg>
      </button>
      <div x-show="open" @click.outside="open=false" x-transition
           class="absolute left-0 top-10 bg-white border border-[var(--border)] rounded-xl shadow-lg w-44 py-1 animate-scalein">
        <a href="#" class="block px-4 py-2.5 text-sm hover:bg-gray-50 font-medium">Photos</a>
        <button @click="loggedInUser && ($store.ui.settingsOpen = !$store.ui.settingsOpen)"
                :class="loggedInUser ? '' : 'opacity-40 cursor-default'"
                class="w-full text-left px-4 py-2.5 text-sm hover:bg-gray-50 flex items-center gap-3">
          <svg class="w-4 h-4 text-muted shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
          Settings
        </button>
      </div>
    </div>

    <!-- Site icon -->
    <a href="/" class="flex items-center gap-2 shrink-0">
      <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center">
        <svg class="w-5 h-5 text-white" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/>
        </svg>
      </div>
      <span class="font-serif text-lg font-bold text-brand hidden sm:block">Phōtos</span>
    </a>

    <!-- Search -->
    <div class="flex-1 max-w-sm mx-2">
      <input type="search" placeholder="Search photos…"
             class="w-full px-3 py-1.5 text-sm border border-[var(--border)] rounded-full bg-gray-50 focus:outline-none focus:ring-2 focus:ring-accent/30 focus:border-accent/60 transition"
             @keydown.enter.prevent="showToast('Search is not yet implemented.')" />
    </div>

    <div class="ml-auto flex items-center gap-1">
      <!-- Random photo -->
      <button @click="loadPhoto('random', null)"
              class="p-2 rounded-lg hover:bg-gray-100 transition" aria-label="Random photo" title="Random photo">
        <svg class="w-5 h-5 text-muted" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 16v-4a8 8 0 0116 0v4M4 16l-2 2m2-2l2 2m12-2l-2 2m2-2l2 2"/>
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 8V4m0 0l2 2M4 4L2 6m16 2V4m0 0l2 2m-2-2l-2 2"/>
        </svg>
      </button>
      <!-- User switcher — only visible when logged-in user has allow_multi_login -->
      <template x-if="loggedInUser && loggedInUser.allowMultiLogin">
        <div class="relative" x-data="userSwitcher">
          <button @click="toggle()"
                  class="flex items-center gap-1 px-2 py-1.5 rounded-lg hover:bg-gray-100 transition text-xs font-medium text-muted border border-dashed border-gray-300"
                  title="Switch acting user">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a4 4 0 00-5-4M9 20H4v-2a4 4 0 015-4m0 0a4 4 0 110-8 4 4 0 010 8zm8-8a4 4 0 110-8 4 4 0 010 8z"/>
            </svg>
            <span x-text="testUser ? testUser.username : loggedInUser.username"></span>
            <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
            </svg>
          </button>
          <div x-show="open" @click.outside="open = false" x-transition
               class="absolute right-0 top-10 bg-white border border-[var(--border)] rounded-xl shadow-lg w-52 py-1 z-50 animate-scalein">
            <p class="px-3 py-1 text-xs font-semibold text-muted uppercase tracking-widest">Act as user</p>
            <!-- Self (no override) -->
            <button @click="selectTestUser(null) || (open = false)"
                    :class="!testUser ? 'bg-gray-50 font-semibold' : ''"
                    class="w-full text-left px-3 py-2 text-sm hover:bg-gray-50 flex items-center gap-2">
              <img :src="loggedInUser.profileImage || ''" class="avatar w-6 h-6 rounded-full object-cover shrink-0" />
              <div>
                <div x-text="loggedInUser.username"></div>
                <div class="text-xs text-muted">You (self)</div>
              </div>
            </button>
            <div class="border-t border-[var(--border)] my-1"></div>
            <template x-for="u in displayUsers" :key="u.userid">
              <button @click="selectTestUser({ userid: u.userid, username: u.username, profileImage: u.profileImage }) || (open = false)"
                      :class="testUser && testUser.userid === u.userid ? 'bg-accent/10 text-accent font-semibold' : ''"
                      class="w-full text-left px-3 py-2 text-sm hover:bg-gray-50 flex items-center gap-2">
                <img :src="u.profileImage || ''" class="avatar w-6 h-6 rounded-full object-cover shrink-0" />
                <span x-text="u.username"></span>
              </button>
            </template>
          </div>
        </div>
      </template>
      <!-- Settings -->
      <div class="relative">
        <button @click="loggedInUser && ($store.ui.settingsOpen = !$store.ui.settingsOpen)"
                :class="loggedInUser ? 'hover:bg-gray-100 cursor-pointer' : 'cursor-default opacity-40'"
                class="p-2 rounded-lg transition" title="Settings">
          <svg class="w-5 h-5 text-muted" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
          </svg>
        </button>

        <!-- Settings popup -->
        <div x-show="$store.ui.settingsOpen" @click.outside="$store.ui.settingsOpen = false" x-transition
             class="absolute right-0 top-11 bg-white border border-[var(--border)] rounded-2xl shadow-2xl w-80 p-5 z-50 animate-scalein">
        <div x-data="avatarSettings">

          <h2 class="font-serif text-xl mb-4">Settings</h2>

          <!-- Current avatar -->
          <div class="flex items-center gap-3 mb-4">
            <img :src="(loggedInUser && loggedInUser.profileImage) || ''" class="avatar w-14 h-14 rounded-full object-cover ring-2 ring-[var(--border)]" />
            <div>
              <p class="text-sm font-semibold" x-text="loggedInUser && loggedInUser.username"></p>
              <p class="text-xs text-muted">Profile image</p>
            </div>
          </div>

          <!-- Profile photo (shown when user has a real photo: OAuth download or upload) -->
          <template x-if="_profileImageSource">
            <div class="mb-4">
              <p class="text-xs font-semibold text-muted uppercase tracking-widest mb-2">Profile photo</p>
              <div class="flex items-center gap-3">
                <button @click="selectProfileImage()" :disabled="saving"
                        :class="loggedInUser && loggedInUser.profileImage === _profileImageSource ? 'ring-2 ring-accent' : 'ring-1 ring-[var(--border)] hover:ring-accent/60'"
                        class="rounded-xl overflow-hidden transition disabled:opacity-40 flex-shrink-0">
                  <img :src="_profileImageSource" class="w-12 h-12 object-cover" />
                </button>
                <p class="text-xs text-muted">Your profile photo</p>
              </div>
            </div>
          </template>

          <!-- Preset avatars -->
          <p class="text-xs font-semibold text-muted uppercase tracking-widest mb-2">Choose avatar</p>
          <div class="grid grid-cols-5 gap-1.5 mb-4">
            <template x-for="hash in presets" :key="hash">
              <button @click="selectPreset(hash)" :disabled="saving"
                      :class="loggedInUser && loggedInUser.profileImage === '/avatars/' + hash ? 'ring-2 ring-accent' : 'ring-1 ring-[var(--border)] hover:ring-accent/60'"
                      class="rounded-xl overflow-hidden transition disabled:opacity-40">
                <img :src="'/avatars/' + hash" class="w-full aspect-square object-cover" />
              </button>
            </template>
          </div>

          <!-- Custom upload (local accounts only) -->
          <template x-if="_provider === 'local'">
            <div>
              <p class="text-xs font-semibold text-muted uppercase tracking-widest mb-2">Custom image</p>
              <label class="flex items-center justify-center gap-2 w-full border border-dashed border-[var(--border)] rounded-xl py-2.5 cursor-pointer hover:bg-gray-50 transition text-sm text-muted"
                     :class="uploading ? 'opacity-40 cursor-wait' : ''">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                </svg>
                <span x-text="uploading ? 'Uploading…' : 'Upload image'"></span>
                <input type="file" accept="image/*" class="hidden" @change="uploadCustom($event)" :disabled="uploading" />
              </label>
            </div>
          </template>

        </div></div>
      </div>

      <!-- Profile / Auth -->
      <div class="relative" x-data="{ open: false }">
        <button @click="open = !open" class="p-1 rounded-lg hover:bg-gray-100 transition" title="Account">
          <template x-if="loggedInUser">
            <img :src="avatarSrc(loggedInUser, 32)" class="w-7 h-7 rounded-full object-cover" />
          </template>
          <template x-if="!loggedInUser">
            <svg class="w-7 h-7 text-muted" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5.121 17.804A4 4 0 019 16h6a4 4 0 013.879 1.804M15 11a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
          </template>
        </button>

        <!-- Auth panel -->
        <div x-show="open" @click.outside="open = false" x-transition
             class="absolute right-0 top-11 bg-white border border-[var(--border)] rounded-2xl shadow-2xl w-80 p-5 z-50 animate-scalein">

          <!-- Logged in state -->
          <template x-if="loggedInUser">
            <div>
              <div class="flex items-center gap-3 mb-4">
                <img :src="avatarSrc(loggedInUser, 48)"
                     class="w-12 h-12 rounded-full object-cover" />
                <div>
                  <div class="font-semibold text-sm" x-text="loggedInUser.username"></div>
                  <div class="text-xs text-muted" x-text="loggedInUser.email"></div>
                </div>
              </div>
              <button @click="logout() || (open = false)"
                      class="w-full bg-gray-100 hover:bg-gray-200 text-brand text-sm py-2 rounded-xl transition font-medium">
                Sign Out
              </button>
            </div>
          </template>

          <!-- Logged out state -->
          <template x-if="!loggedInUser">
            <div x-data="authModal">

              <!-- Google -->
              <a x-show="authConfig.googleEnabled"
                 href="/auth/google"
                 class="flex items-center justify-center gap-3 w-full border border-[var(--border)] rounded-xl py-2.5 mb-3 hover:bg-gray-50 transition text-sm font-medium">
                <svg class="w-5 h-5" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                Sign in with Google
              </a>

              <!-- Apple -->
              <a x-show="authConfig.appleEnabled"
                 href="/auth/apple"
                 class="flex items-center justify-center gap-3 w-full bg-black text-white rounded-xl py-2.5 mb-4 hover:bg-gray-900 transition text-sm font-medium">
                <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.07c1.22.07 2.08.67 2.82.68.96-.15 1.84-.78 2.96-.83 1.28-.07 2.5.54 3.24 1.52-2.79 1.68-2.32 5.34.28 6.66-.53 1.47-1.28 2.93-2.3 4.18zM12.03 7c-.09-2.29 1.79-4.27 3.97-4.35.28 2.51-2.3 4.43-3.97 4.35z"/></svg>
                Sign in with Apple
              </a>

              <!-- Divider — only shown when at least one OAuth provider is available -->
              <div x-show="authConfig.googleEnabled || authConfig.appleEnabled" class="flex items-center gap-2 mb-4">
                <div class="flex-1 border-t border-[var(--border)]"></div>
                <span class="text-xs text-muted">or</span>
                <div class="flex-1 border-t border-[var(--border)]"></div>
              </div>

              <!-- Login / Register tabs -->
              <div class="flex rounded-xl bg-gray-100 p-1 mb-4">
                <button @click="(authTab = 'login') && (authError = '')"
                        :class="authTab === 'login' ? 'bg-white shadow text-brand' : 'text-muted'"
                        class="flex-1 text-sm py-1.5 rounded-lg font-medium transition">Login</button>
                <button @click="(authTab = 'register') && (authError = '')"
                        :class="authTab === 'register' ? 'bg-white shadow text-brand' : 'text-muted'"
                        class="flex-1 text-sm py-1.5 rounded-lg font-medium transition">Register</button>
              </div>

              <!-- Error -->
              <p x-show="authError" x-text="authError" class="text-xs text-red-500 mb-3 -mt-2"></p>

              <!-- Login form -->
              <template x-if="authTab === 'login'">
                <div class="space-y-3">
                  <input x-model="authEmail" type="text" placeholder="Email or username"
                         class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30" />
                  <input x-model="authPassword" type="password" placeholder="Password"
                         @keydown.enter="doLogin()"
                         class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30" />
                  <button @click="doLogin()" :disabled="authLoading"
                          class="w-full bg-brand text-white py-2.5 rounded-xl font-medium hover:bg-accent transition text-sm disabled:opacity-40">
                    <span x-text="authLoading ? 'Signing in…' : 'Log In'"></span>
                  </button>
                </div>
              </template>

              <!-- Register form -->
              <template x-if="authTab === 'register'">
                <div class="space-y-3">
                  <input x-model="authUsername" type="text" placeholder="Username"
                         class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30" />
                  <input x-model="authEmail" type="email" placeholder="Email"
                         class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30" />
                  <input x-model="authPassword" type="password" placeholder="Password (min 8 chars)"
                         @keydown.enter="doRegister()"
                         class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30" />
                  <button @click="doRegister()" :disabled="authLoading"
                          class="w-full bg-brand text-white py-2.5 rounded-xl font-medium hover:bg-accent transition text-sm disabled:opacity-40">
                    <span x-text="authLoading ? 'Creating account…' : 'Create Account'"></span>
                  </button>
                </div>
              </template>

            </div>
          </template>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- ══ MAIN ═════════════════════════════════════════════════════════════════ -->
<main class="flex-1 max-w-7xl w-full mx-auto px-4 py-8" x-cloak>

  <!-- Loading -->
  <div x-show="loading" class="flex items-center justify-center py-32">
    <div class="w-10 h-10 border-4 border-accent/30 border-t-accent rounded-full animate-spin"></div>
  </div>

  <template x-if="photo && !loading">
    <div class="animate-fadein space-y-4">

      <!-- Photo + Related -->
      <div class="flex gap-4 items-start">
        <div class="flex-1 min-w-0 bg-white rounded-2xl overflow-hidden ring-1 ring-[var(--border)] shadow-sm">
          <div class="bg-gray-100">
            <img :src="photo.image.url" :alt="photo.title.text"
                 :class="photo.image.height > photo.image.width
                   ? 'w-full object-contain max-h-[85vh]'
                   : 'w-full object-cover max-h-[70vh]'"
                 loading="eager" />
          </div>
        </div>

        <template x-if="photo.related && photo.related.length">
          <div class="w-36 shrink-0 hidden md:flex flex-col gap-3 overflow-y-auto pr-1"
               :style="photo.image.height > photo.image.width ? 'max-height:85vh' : 'max-height:70vh'">
            <template x-for="rel in photo.related" :key="rel.photoid">
              <a href="#" @click.prevent="loadPhoto(rel.photoid)" class="block rounded-xl overflow-hidden ring-1 ring-[var(--border)] hover:ring-accent/60 transition shadow-sm shrink-0">
                <img :src="thumbUrl(rel.imageurl, 144)" :alt="rel.photoid" class="w-full h-24 object-cover hover:opacity-90 transition" />
              </a>
            </template>
          </div>
        </template>
      </div>

      <!-- Title + Description -->
      <div class="bg-white rounded-2xl ring-1 ring-[var(--border)] shadow-sm px-6 py-5"
           x-data="titleEditor(photo)">
        <!-- View mode -->
        <template x-if="!editing">
          <h1 class="text-3xl font-serif"
              :class="photo.title.canedit ? 'cursor-pointer hover:text-gray-400 transition-colors' : ''"
              :title="photo.title.canedit ? 'Click to edit title' : ''"
              @click="photo.title.canedit && startEdit()"
              x-text="photo.title.text">
          </h1>
        </template>
        <!-- Edit mode -->
        <template x-if="editing">
          <div class="flex items-center gap-2">
            <input x-ref="titleInput"
                   x-model="draft"
                   @keydown.enter.prevent="save()"
                   @keydown.escape.prevent="cancel()"
                   @blur="save()"
                   class="flex-1 text-3xl font-serif bg-transparent border-b-2 border-gray-300 focus:outline-none" />
            <button @mousedown.prevent="cancel()"

                                                                  <template x-if="showingReplies">
                                                                    <div class="mt-1 space-y-2 border-l-2 border-[var(--border)] ml-1 pl-2">
                                                                      <div x-show="loadingReplies" class="flex justify-center"><div class="w-3 h-3 border-2 border-accent/30 border-t-accent rounded-full animate-spin"></div></div>
                                                                      <template x-for="r5 in replies" :key="r5.commentid">
                                                                        <div x-data="commentItem(r5, photoid, depth + 1)" class="flex gap-1.5">
                                                                          <img :src="c.author.tn || ''" class="avatar w-4 h-4 rounded-full object-cover shrink-0 mt-0.5" />
                                                                          <div class="flex-1 min-w-0">
                                                                            <span class="font-semibold text-xs" x-text="c.author.username"></span>
                                                                            <span class="text-xs text-muted ml-1" x-text="formatDate(c.date)"></span>
                                                                            <p class="text-xs leading-relaxed" x-text="c.comment"></p>
                                                                          </div>
                                                                        </div>
                                                                      </template>
                                                                    </div>
                                                                  </template>
                                                                </div>
                                                              </div>
                                                            </div>
                                                          </template>
                                                        </div>
                                                      </template>
                                                    </div>
                                                  </div>
                                                </div>
                                              </template>
                                            </div>
                                          </template>
                                        </div>
                                      </div>
                                    </div>
                                  </template>
                                </div>
                              </template>
                            </div>
                          </div>
                        </div>
                      </template>
                    </div>
                  </template>

                </div>
              </div>
            </div>
          </template>
        </div>

        <!-- Load more -->
        <template x-if="photo.commentsurl">
          <div class="mt-6 text-center">
            <button @click="loadMore()" :disabled="loadingMore"
                    class="text-sm text-accent hover:underline disabled:opacity-40">
              <span x-text="loadingMore ? 'Loading…' : 'Load more comments'"></span>
            </button>
          </div>
        </template>

      </div>

    </div>
  </template>

  <div x-show="error && !loading" class="text-center py-32">
    <p class="text-accent text-lg font-serif" x-text="error"></p>
  </div>
</main>

<!-- ══ FOOTER ════════════════════════════════════════════════════════════════ -->
<footer class="mt-16 border-t border-[var(--border)] bg-white">
  <div class="max-w-7xl mx-auto px-4 py-5 flex flex-wrap items-center justify-between gap-3 text-xs text-muted">
    <span>© 2024 Phōtos. All rights reserved.</span>
    <div class="flex gap-4">
      <a href="#" @click.prevent="showToast('Terms of Service not yet available.')"
         class="hover:text-brand underline underline-offset-2">Terms of Service</a>
      <a href="#" @click.prevent="showToast('Privacy Policy not yet available.')"
         class="hover:text-brand underline underline-offset-2">Privacy Policy</a>
    </div>
  </div>
</footer>

<!-- ══ MODALS ════════════════════════════════════════════════════════════════ -->

<!-- Toast -->
<div x-show="toast.visible" x-cloak
     x-transition:enter="transition ease-out duration-200"
     x-transition:enter-start="opacity-0 translate-y-2"
     x-transition:enter-end="opacity-100 translate-y-0"
     x-transition:leave="transition ease-in duration-150"
     x-transition:leave-start="opacity-100"
     x-transition:leave-end="opacity-0"
     class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[100] bg-brand text-white text-sm px-5 py-3 rounded-2xl shadow-xl"
     x-text="toast.message">
</div>

<!-- User login modal -->
<template x-if="userModal">
  <div class="fixed inset-0 z-50 flex items-center justify-center backdrop p-4" @click.self="userModal = false">
    <div class="bg-white rounded-2xl shadow-2xl w-80 p-6 animate-scalein">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-serif text-xl">Sign In</h2>
        <button @click="userModal = false" class="text-muted hover:text-brand text-2xl leading-none">&times;</button>
      </div>
      <div class="space-y-3">
        <div>
          <label class="text-xs font-medium text-muted block mb-1">Username</label>
          <input type="text" placeholder="your_username"
                 class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30" />
        </div>
        <div>
          <label class="text-xs font-medium text-muted block mb-1">Password</label>
          <input type="password" placeholder="••••••••"
                 class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30" />
        </div>
        <button @click="(userModal = false) || showToast('Login is not yet available.')"
                class="w-full bg-brand text-white py-2.5 rounded-xl font-medium hover:bg-accent transition text-sm mt-2">
          Log In
        </button>
      </div>
    </div>
  </div>
</template>

<!-- Add / Edit label modal -->
<template x-if="$store.ui.labelModal">
  <div class="fixed inset-0 z-50 flex items-center justify-center backdrop p-4"
       @click.self="$store.ui.labelModal = false">
    <div class="bg-white rounded-2xl shadow-2xl w-96 p-6 animate-scalein"
         x-data="labelEditor(labelModalData, photo)"
         x-init="init()">
      <div class="flex items-center justify-between mb-5">
        <h2 class="font-serif text-xl" x-text="editingLabel ? 'Edit Label' : 'Add Label'"></h2>
        <button @click="$dispatch('photoapp:close-label-modal')" class="text-muted hover:text-brand text-2xl leading-none">&times;</button>
      </div>

      <div class="space-y-4">
        <!-- Name -->
        <div>
          <label class="text-xs font-medium text-muted block mb-1">Name</label>
          <!-- Editing: name is fixed, shown as read-only -->
          <template x-if="editingLabel">
            <div class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm bg-gray-50 text-brand font-medium" x-text="editingLabel.name"></div>
          </template>
          <!-- Adding: full name picker -->
          <template x-if="!editingLabel">
            <div>
              <select x-show="!nameIsOther"
                      x-model="selectedName"
                      @change="onNameChange()"
                      class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30 bg-white">
                <option value="" disabled>— choose a name —</option>
                <template x-for="n in knownNames" :key="n">
                  <option :value="n" x-text="n"></option>
                </template>
                <option value="__other__">Other…</option>
              </select>
              <input x-show="nameIsOther"
                     x-model="customName"
                     x-ref="customNameInput"
                     type="text" placeholder="Enter label name"
                     class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30 mt-1" />
              <button x-show="nameIsOther"
                      @click="(nameIsOther = false) || (selectedName = '')"
                      class="text-xs text-accent mt-1 hover:underline">← back to list</button>
            </div>
          </template>
        </div>

        <!-- Value -->
        <div>
          <label class="text-xs font-medium text-muted block mb-1">Value</label>
          <div x-show="loadingValues" class="text-xs text-muted py-2">Loading…</div>
          <template x-if="!loadingValues">
            <div>
              <select x-show="!valueIsOther"
                      x-model="selectedValue"
                      class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30 bg-white"
                      @change="onValueChange()">
                <option value="" disabled>— choose a value —</option>
                <template x-for="v in knownValues" :key="v">
                  <option :value="v" x-text="v"></option>
                </template>
                <option value="__other__">Other…</option>
              </select>
              <input x-show="valueIsOther"
                     x-model="customValue"
                     x-ref="customValueInput"
                     type="text" placeholder="Enter label value"
                     class="w-full border border-[var(--border)] rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-accent/30 mt-1"
                     @keydown.enter.prevent="save()" />
              <button x-show="valueIsOther && knownValues.length > 0"
                      @click="(valueIsOther = false) || (selectedValue = '')"
                      class="text-xs text-accent mt-1 hover:underline">← back to list</button>
            </div>
          </template>
        </div>

        <button @click="save()"
                :disabled="saving || !effectiveName || !effectiveValue"
                class="w-full bg-brand text-white py-2.5 rounded-xl font-medium hover:bg-accent transition text-sm disabled:opacity-40 disabled:cursor-not-allowed">
          <span x-text="saving ? 'Saving…' : (editingLabel ? 'Save Changes' : 'Add Label')"></span>
        </button>
      </div>
    </div>
  </div>
</template>

<!-- Emoji picker modal -->
<template x-if="$store.ui.emojiPickerOpen">
  <div class="fixed inset-0 z-50 flex items-center justify-center backdrop p-4"
       @click.self="$store.ui.emojiPickerOpen = false"
       @close-emoji-picker="$store.ui.emojiPickerOpen = false">
    <div class="bg-white rounded-2xl shadow-2xl w-[28rem] p-5 animate-scalein flex flex-col" style="max-height:80vh"
         x-data="emojiPicker(photo)"
         x-init="init()">

      <!-- Header -->
      <div class="flex items-center justify-between mb-3 shrink-0">
        <h2 class="font-serif text-xl">Add Reaction</h2>
        <button @click="$dispatch('close-emoji-picker')" class="text-muted hover:text-brand text-2xl leading-none">&times;</button>
      </div>

      <!-- Search -->
      <div class="relative mb-3 shrink-0">
        <input x-model="search"
               @input.debounce.300ms="doSearch()"
               type="search" placeholder="Search emojis…"
               class="w-full pl-8 pr-3 py-2 text-sm border border-[var(--border)] rounded-xl focus:outline-none focus:ring-2 focus:ring-accent/30" />
        <svg class="absolute left-2.5 top-2.5 w-3.5 h-3.5 text-muted" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35M17 11A6 6 0 115 11a6 6 0 0112 0z"/>
        </svg>
      </div>

      <!-- Loading spinner -->
      <div x-show="loading" class="flex justify-center py-8 shrink-0">
        <div class="w-6 h-6 border-2 border-accent/30 border-t-accent rounded-full animate-spin"></div>
      </div>

      <!-- Emoji grid -->
      <div x-show="!loading" class="overflow-y-auto flex-1 min-h-0" @click.self="skintoneTarget = null">
        <div x-show="emojis.length === 0" class="text-center text-muted text-sm py-8">No emojis found.</div>
        <div class="grid grid-cols-8 gap-1">
          <template x-for="em in emojis" :key="em.emojiid">
            <div class="relative">
              <button @click="handleEmojiClick(em)"
                      :title="em.alttext"
                      :class="[
                        reactedIds.has(em.emojiid) ? 'bg-accent/10 ring-1 ring-accent/40' : 'hover:bg-gray-100',
                        skintoneTarget && skintoneTarget.emojiid === em.emojiid ? 'ring-2 ring-brand' : ''
                      ]"
                      class="w-12 h-12 flex items-center justify-center rounded-xl transition select-none relative">
                <template x-if="em.imageurl">
                  <img :src="em.imageurl" :alt="em.alttext" class="w-8 h-8 object-contain" />
                </template>
                <template x-if="!em.imageurl && em.emoji">
                  <span class="text-2xl" x-text="em.emoji"></span>
                </template>
                <!-- Skintone indicator dot -->
                <template x-if="em.has_skintones">
                  <span class="absolute bottom-1 right-1 w-2 h-2 rounded-full border border-white"
                        style="background: linear-gradient(135deg,#FFDBB4 0%,#C68642 50%,#4A2912 100%)"></span>
                </template>
              </button>

              <!-- Skintone variant popover -->
              <template x-if="skintoneTarget && skintoneTarget.emojiid === em.emojiid">
                <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-1 z-30
                            bg-white border border-[var(--border)] rounded-xl shadow-xl p-2
                            flex items-center gap-1 animate-scalein"
                     style="min-width: max-content">
                  <div x-show="skintoneLoading" class="px-3 py-1 text-xs text-muted">Loading…</div>
                  <template x-if="!skintoneLoading">
                    <div class="flex items-center gap-1">
                      <template x-for="v in skintoneVariants" :key="v.emojiid">
                        <button @click.stop="react(v) || (skintoneTarget = null)"
                                :title="v.skintone ? v.skintone + ' skin tone' : 'default'"
                                :class="reactedIds.has(v.emojiid) ? 'ring-2 ring-accent' : 'hover:bg-gray-100'"
                                class="w-10 h-10 flex items-center justify-center rounded-lg transition relative">
                          <img :src="v.imageurl" :alt="v.alttext" class="w-7 h-7 object-contain" />
                          <!-- Tone swatch dot -->
                          <template x-if="v.skintone">
                            <span class="absolute bottom-0.5 right-0.5 w-2 h-2 rounded-full border border-white"
                                  :style="`background:${skintoneColor(v.skintone)}`"></span>
                          </template>
                        </button>
                      </template>
                    </div>
                  </template>
                </div>
              </template>
            </div>
          </template>
        </div>
      </div>

      <!-- Pagination -->
      <div x-show="!loading && total > limit" class="flex items-center justify-between mt-3 pt-3 border-t border-[var(--border)] shrink-0 text-sm">
        <button @click="prevPage()" :disabled="offset === 0"
                class="px-3 py-1.5 rounded-lg border border-[var(--border)] hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition">← Prev</button>
        <span class="text-xs text-muted">
          <span x-text="offset + 1"></span>–<span x-text="Math.min(offset + limit, total)"></span>
          of <span x-text="total"></span>
        </span>
        <button @click="nextPage()" :disabled="offset + limit >= total"
                class="px-3 py-1.5 rounded-lg border border-[var(--border)] hover:bg-gray-50 disabled:opacity-40 disabled:cursor-not-allowed transition">Next →</button>
      </div>

    </div>
  </div>
</template>

</body>
</html>
